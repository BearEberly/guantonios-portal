<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Staff | Staff Hub</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body data-page="staff">
    <div id="siteHeaderMount"></div>

    <div class="app-shell" id="staffPage">
      <aside id="appNavMount" class="app-nav"></aside>
      <main class="app-main">
        <div id="appSetupNotice" class="notice" hidden></div>
        <div class="page-head">
          <div>
            <h1>Staff</h1>
          </div>
        </div>

        <section class="card table-wrap">
          <h3>Staff Directory</h3>
          <table class="staff-table staff-directory-table">
            <thead>
              <tr>
                <th>Name</th>
                <th>Position</th>
                <th>Status</th>
                <th>Email</th>
                <th>Phone</th>
                <th>User ID</th>
                <th>
                  <button class="btn btn--primary btn--small staff-edit-toggle" id="staffEditToggle" type="button" aria-pressed="false">Edit</button>
                </th>
              </tr>
            </thead>
            <tbody id="staffRows">
              <tr><td colspan="7">Loading...</td></tr>
            </tbody>
          </table>
        </section>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/js/config.js?v=20260308i"></script>
    <script src="/js/site.js?v=20260308i"></script>
    <script src="/js/public.js?v=20260308i"></script>
    <script src="/js/auth.js?v=20260308i"></script>
    <script src="/js/app.js?v=20260308i"></script>
    <script src="/js/pages.js?v=20260308i"></script>
    <script src="/js/main.js?v=20260308i"></script>
  </body>
</html>
