<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Schedule | Staff Hub</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body data-page="schedule">
    <div id="siteHeaderMount"></div>


    <div class="app-shell">
      <aside id="appNavMount" class="app-nav"></aside>
      <main class="app-main">
        <div id="appSetupNotice" class="notice" hidden></div>
        <h1>Schedule</h1>
        <section class="card table-wrap schedule-roster-card">
          <h3>Team Roster</h3>
          <div class="schedule-toolbar">
            <button class="schedule-week-nav" id="scheduleWeekPrev" type="button" aria-label="Previous week">‹</button>
            <div class="form-row schedule-week-input">
              <label for="scheduleWeekAnchor">Week</label>
              <input id="scheduleWeekAnchor" type="date" />
            </div>
            <button class="schedule-week-nav" id="scheduleWeekNext" type="button" aria-label="Next week">›</button>
          </div>
          <div class="schedule-meta-row">
            <p class="small schedule-week-range" id="scheduleWeekRange">Sunday - Saturday</p>
            <div class="schedule-save-wrap">
              <button class="btn btn--primary btn--small" id="scheduleSaveBtn" type="button" hidden>Save Schedule</button>
              <button class="btn btn--small schedule-export-btn" id="scheduleCalendarExportBtn" type="button" hidden>
                <span class="schedule-export-icons" aria-hidden="true">
                  <span class="schedule-export-icon schedule-export-icon--apple">
                    <span class="schedule-export-icon__date">17</span>
                  </span>
                  <span class="schedule-export-icon schedule-export-icon--google">
                    <span class="schedule-export-icon__date">31</span>
                  </span>
                </span>
                <span>Download to Calendar</span>
              </button>
              <p class="schedule-save-flash" id="scheduleSavedFlash" aria-live="polite">Saved</p>
            </div>
          </div>
          <div class="table-scroll">
            <table class="schedule-grid-table">
              <thead>
                <tr id="scheduleGridHead">
                  <th>Name</th>
                  <th>Sun</th>
                  <th>Mon</th>
                  <th>Tue</th>
                  <th>Wed</th>
                  <th>Thu</th>
                  <th>Fri</th>
                  <th>Sat</th>
                </tr>
              </thead>
              <tbody id="scheduleGridRows">
                <tr><td colspan="8">Loading...</td></tr>
              </tbody>
            </table>
          </div>
          <div class="schedule-mobile-list" id="scheduleMobileList" aria-live="polite"></div>
        </section>

        <section class="card table-wrap schedule-saved-card" id="scheduleSavedSection" hidden>
          <h3>Saved Schedule</h3>
          <div class="schedule-saved-nav">
            <button class="schedule-week-nav" id="scheduleSavedPrev" type="button" aria-label="Previous week (saved schedule)">‹</button>
            <p class="small schedule-saved-range" id="scheduleSavedRange">17-day running view</p>
            <button class="schedule-week-nav" id="scheduleSavedNext" type="button" aria-label="Next week (saved schedule)">›</button>
          </div>
          <div class="table-scroll">
            <table class="schedule-saved-table">
              <thead>
                <tr id="scheduleSavedGridHead">
                  <th>Name</th>
                </tr>
                <tr id="scheduleSavedGridRoleCounts">
                  <th>Roles</th>
                </tr>
              </thead>
              <tbody id="scheduleSavedGridRows">
                <tr><td colspan="18">Loading...</td></tr>
              </tbody>
            </table>
          </div>
          <div class="schedule-saved-mobile-list" id="scheduleSavedMobileList" aria-live="polite"></div>
        </section>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/js/config.js?v=20260308h"></script>
    <script src="/js/site.js?v=20260308h"></script>
    <script src="/js/public.js?v=20260308h"></script>
    <script src="/js/auth.js?v=20260308h"></script>
    <script src="/js/app.js?v=20260308h"></script>
    <script src="/js/pages.js?v=20260308h"></script>
    <script src="/js/main.js?v=20260308h"></script>
  </body>
</html>
